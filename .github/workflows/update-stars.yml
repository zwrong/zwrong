name: Update Star Counts

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Vibe-Trading stars
        run: |
          STARS=$(gh api repos/HKUDS/Vibe-Trading --jq '.stargazers_count')
          echo "STARS=$STARS" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Vibe-Trading star count
        run: |
          K=$(echo "scale=1; ${{ env.STARS }} / 1000" | bc)
          sed -E -i "s/(\[\*\*Vibe-Trading\*\*\]\([^)]*\) ⭐ )([0-9.]+K)/\1${K}K/" README.md
          echo "Vibe-Trading: ${{ env.STARS }} → ${K}K"

      - name: Get Paper2Slides stars
        run: |
          STARS=$(gh api repos/HKUDS/Paper2Slides --jq '.stargazers_count')
          echo "P2S_STARS=$STARS" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Paper2Slides star count
        run: |
          K=$(echo "scale=1; ${{ env.P2S_STARS }} / 1000" | bc)
          sed -E -i "s/(\[\*\*Paper2Slides\*\*\]\([^)]*\) ⭐ )([0-9.]+K)/\1${K}K/" README.md
          echo "Paper2Slides: ${{ env.P2S_STARS }} → ${K}K"

      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update star counts"
            git push
          else
            echo "No changes — star counts are already current"
          fi
